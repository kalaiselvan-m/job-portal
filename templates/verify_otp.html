{% extends 'base.html' %}
{% block content %}

<div class="verify-bg">

<div class="verify-card">

<div class="text-center mb-4">

<i class="bi bi-shield-check verify-icon"></i>

<h3 class="fw-bold mt-2">Email Verification</h3>

<p class="text-muted">
Enter the OTP sent to your email
</p>

</div>


<form method="POST">

{% csrf_token %}

<!-- OTP INPUT -->

<div class="mb-3">

<label class="form-label fw-bold">Enter OTP</label>

<input type="text"
name="otp"
class="form-control otp-input"
placeholder="Enter 6-digit OTP"
required>

</div>


<!-- VERIFY BUTTON -->

<button class="btn btn-verify w-100">

<i class="bi bi-check-circle"></i>
Verify OTP

</button>

</form>

</div>

</div>



<style>

/* ================= BACKGROUND ================= */

.verify-bg{

min-height:70vh;
display:flex;
align-items:center;
justify-content:center;

}



/* ================= CARD ================= */

.verify-card{

background:rgba(255,255,255,0.95);
padding:40px;
border-radius:16px;
width:350px;

box-shadow:0 15px 35px rgba(0,0,0,0.2);

animation:fadeUp 0.6s ease;

}



/* ================= ICON ================= */

.verify-icon{

font-size:50px;
color:#22c55e;

}



/* ================= OTP INPUT ================= */

.otp-input{

text-align:center;
font-size:18px;
letter-spacing:3px;
border-radius:10px;

}



/* ================= BUTTON ================= */

.btn-verify{

background:linear-gradient(90deg,#22c55e,#4ade80);
color:white;
font-weight:bold;
border-radius:20px;
transition:0.3s;

}

.btn-verify:hover{

transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
color:white;

}



/* ================= ANIMATION ================= */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

{% endblock %}
