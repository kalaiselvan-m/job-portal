{% extends 'base.html' %}
{% block content %}

<!-- PARTICLES JS -->
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<div class="login-bg">

    <!-- 3D BLOBS -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div id="particles-js"></div>

    <div class="login-wrapper">

        <div class="login-card">

            <h3 class="text-center mb-4 fw-bold">
                Login to Job Portal
            </h3>

            <form method="POST" onsubmit="showLoader()">

                {% csrf_token %}

                <!-- USERNAME -->
                <div class="form-floating mb-3">

                    <input type="text"
                           class="form-control"
                           name="username"
                           placeholder="Username"
                           required>

                    <label>Username</label>

                </div>


                <!-- PASSWORD -->
                <div class="form-floating mb-3">

                    <div class="input-group">

                        <input type="password"
                               id="password"
                               class="form-control"
                               name="password"
                               placeholder="Password"
                               required>

                        <span class="input-group-text toggle-eye"
                              onclick="togglePassword()">

                            <i class="bi bi-eye"></i>

                        </span>

                    </div>

                </div>


                <!-- LOGIN BUTTON -->
                <button class="btn login-btn w-100 mt-2">

                    <span id="loginText">Login</span>

                    <span class="spinner-border spinner-border-sm"
                          id="loader"></span>

                </button>


                <!-- REGISTER LINK -->
                <div class="text-center mt-3">

                    <small>
                        Don't have an account?
                        <a href="{% url 'register' %}" class="text-white fw-bold">
                            Register
                        </a>
                    </small>

                </div>

            </form>

        </div>

    </div>

</div>



<style>

/* MAIN BACKGROUND */

.login-bg{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
overflow:hidden;
padding:80px 20px;
}


/* 3D BLOBS */

.blob{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:0.6;
animation:blobMove 20s infinite alternate ease-in-out;
}

.blob1{
background:#6366f1;
top:-100px;
left:-100px;
}

.blob2{
background:#9333ea;
bottom:-120px;
right:-120px;
}

.blob3{
background:#06b6d4;
top:50%;
left:60%;
}


/* BLOB ANIMATION */

@keyframes blobMove{

0%{transform:translate(0,0) scale(1);}

50%{transform:translate(80px,-60px) scale(1.2);}

100%{transform:translate(-80px,60px) scale(1);}

}


/* PARTICLES BACKGROUND */

#particles-js{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}


/* LOGIN WRAPPER */

.login-wrapper{
position:relative;
z-index:2;
}


/* LOGIN CARD */

.login-card{
width:420px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
box-shadow:0 20px 60px rgba(0,0,0,0.5);
color:white;
animation:floatCard 6s ease-in-out infinite;
position:relative;
}


/* GRADIENT BORDER */

.login-card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(270deg,#ff00cc,#6366f1,#06b6d4,#ff00cc);
background-size:600% 600%;
border-radius:22px;
z-index:-1;
animation:borderAnimation 8s linear infinite;
}


/* BUTTON */

.login-btn{
background:white;
font-weight:bold;
border-radius:10px;
padding:12px;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}


/* LOADER */

#loader{
display:none;
margin-left:8px;
}


/* PASSWORD EYE */

.toggle-eye{
cursor:pointer;
}


/* FLOAT CARD */

@keyframes floatCard{

0%{transform:translateY(0);}

50%{transform:translateY(-10px);}

100%{transform:translateY(0);}

}


/* BORDER ANIMATION */

@keyframes borderAnimation{

0%{background-position:0% 50%;}

50%{background-position:100% 50%;}

100%{background-position:0% 50%;}

}

</style>



<script>

/* PASSWORD SHOW/HIDE */

function togglePassword(){

const pass=document.getElementById("password");
const icon=document.querySelector(".toggle-eye i");

if(pass.type==="password"){

pass.type="text";
icon.classList.replace("bi-eye","bi-eye-slash");

}else{

pass.type="password";
icon.classList.replace("bi-eye-slash","bi-eye");

}

}


/* LOGIN LOADER */

function showLoader(){

document.getElementById("loader").style.display="inline-block";
document.getElementById("loginText").style.display="none";

}


/* PARTICLES ANIMATION */

document.addEventListener("DOMContentLoaded",function(){

particlesJS("particles-js",{

particles:{
number:{value:60,density:{enable:true,value_area:800}},
color:{value:"#ffffff"},
shape:{type:"circle"},
opacity:{value:0.5},
size:{value:3,random:true},

line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.4,
width:1
},

move:{
enable:true,
speed:1.5
}

},

interactivity:{
events:{
onhover:{enable:true,mode:"repulse"},
onclick:{enable:true,mode:"push"}
}
},

retina_detect:true

});

});

</script>

{% endblock %}
