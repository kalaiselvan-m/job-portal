{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">

<h2 class="mb-4">My Posted Jobs</h2>

{% for job in jobs %}

<div class="card p-4 mb-3 shadow-sm">

<h5>{{ job.title }}</h5>

<p>{{ job.description }}</p>

<p>
<b>Location:</b> {{ job.location }}
</p>

<p>
<b>ATS Required:</b> {{ job.minimum_ats_score }}%
</p>

</div>

{% empty %}

<p>No jobs posted yet.</p>

{% endfor %}

</div>

{% endblock %}
